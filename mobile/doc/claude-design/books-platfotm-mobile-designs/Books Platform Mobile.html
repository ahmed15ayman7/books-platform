<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Books Platform — Mobile App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #ECECEF; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  #root { width: 100%; }
  button { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes bpspin { to { transform: rotate(360deg); } }
  @keyframes bptoast { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes obIn { from { opacity: 0; transform: translateY(18px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes obUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bpsheetup { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes bpfade { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data (plain JS) -->
<script src="bp/data.js"></script>

<!-- starter components (babel) -->
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="frames/tweaks-panel.jsx"></script>

<!-- app (babel) -->
<script type="text/babel" src="bp/ui.jsx"></script>
<script type="text/babel" src="bp/screens-a.jsx"></script>
<script type="text/babel" src="bp/screens-b.jsx"></script>
<script type="text/babel" src="bp/screens-c.jsx"></script>
<script type="text/babel" src="bp/screens-d.jsx"></script>
<script type="text/babel" src="bp/screens-e.jsx"></script>
<script type="text/babel" src="bp/onboarding.jsx"></script>
<script type="text/babel" src="bp/app.jsx"></script>
</body>
</html>
