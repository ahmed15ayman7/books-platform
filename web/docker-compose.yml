version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Coolify (and similar) reach the app on the Docker network; do not bind host :3000.
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
